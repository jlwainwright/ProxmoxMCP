# Prometheus configuration for ProxmoxMCP monitoring

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ProxmoxMCP server metrics (if metrics endpoint added)
  - job_name: 'proxmox-mcp'
    static_configs:
      - targets: ['proxmox-mcp:8080']
    metrics_path: '/metrics'
    scrape_interval: 30s
    scrape_timeout: 10s

  # Redis metrics (if redis_exporter added)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Optional: Proxmox server metrics (if node_exporter installed)
  # - job_name: 'proxmox-nodes'
  #   static_configs:
  #     - targets: ['proxmox-server:9100']
  #   scrape_interval: 60s

  # Optional: Docker container metrics
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['host.docker.internal:9323']
  #   scrape_interval: 30s