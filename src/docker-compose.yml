# ProxmoxMCP Docker Compose Configuration
# Production-ready multi-service deployment

version: '3.8'

services:
  # ProxmoxMCP Server - Main service
  proxmox-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proxmox-mcp-server
    restart: unless-stopped
    environment:
      - PROXMOX_MCP_CONFIG=/app/config/config.json
      - PYTHONPATH=/app/src
    ports:
      - "8080:8080"  # HTTP mode port
    volumes:
      - ./config/examples/config.json:/app/config/config.json:ro
      - ./logs:/app/logs
      - proxmox-data:/app/data
    networks:
      - proxmox-network
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import proxmox_mcp; print('OK')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis - For session storage and caching (OAuth mode)
  redis:
    image: redis:7.2-alpine
    container_name: proxmox-mcp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - proxmox-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Prometheus - Monitoring and metrics
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: proxmox-mcp-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - proxmox-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Monitoring dashboard
  grafana:
    image: grafana/grafana-oss:10.2.0
    container_name: proxmox-mcp-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
      - GF_ANALYTICS_CHECK_FOR_UPDATES=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - proxmox-network
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx - Reverse proxy (optional, for production SSL termination)
  nginx:
    image: nginx:1.25-alpine
    container_name: proxmox-mcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    networks:
      - proxmox-network
    depends_on:
      - proxmox-mcp
    profiles:
      - production  # Only start with --profile production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# Named volumes for data persistence
volumes:
  proxmox-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  nginx-logs:
    driver: local

# Custom network for service communication
networks:
  proxmox-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16